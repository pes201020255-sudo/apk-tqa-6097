name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          # تثبيت command line tools
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -fsSL -o cmdline-tools.zip             "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses > /dev/null 2>&1 || true
          sdkmanager --sdk_root=$HOME/android-sdk             "platforms;android-34"             "build-tools;34.0.0"             "platform-tools"

      - name: Build APK with Gradle
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          # تحميل gradle wrapper
          curl -fsSL -o /tmp/gradle.zip             "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          export GRADLE_BIN=/tmp/gradle-dist/gradle-8.7/bin/gradle
          chmod +x $GRADLE_BIN
          $GRADLE_BIN assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
